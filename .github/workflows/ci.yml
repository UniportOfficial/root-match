name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev
      - dev-monorepo

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        task:
          - lint
          - format:check
          - typecheck
          - build
          - guard:no-mock-auth

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 11.3.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        if: matrix.task != 'lint' && matrix.task != 'format:check' && matrix.task != 'guard:no-mock-auth'
        run: pnpm --filter @rootmatching/shared run build

      - name: Run ${{ matrix.task }}
        run: pnpm run ${{ matrix.task }}
