name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev
      - dev-monorepo

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        task:
          - lint
          - format:check
          - typecheck
          - build
          - guard:no-mock-auth

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.3.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        if: matrix.task != 'lint' && matrix.task != 'format:check' && matrix.task != 'guard:no-mock-auth'
        run: pnpm --filter @rootmatching/shared run build

      - name: Run ${{ matrix.task }}
        run: pnpm run ${{ matrix.task }}
